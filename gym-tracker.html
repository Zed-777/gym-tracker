<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Gym Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --ac: #3B82F6;
      --ac2: #1D4ED8;
      --bg: #0f172a;
      --bg2: #1e293b;
      --fg: #f1f5f9;
      --fg2: #cbd5e1;
      --border: #334155;
      --reps: #8B5CF6;
      --weight: #F59E0B;
      --intensity: #EF4444;
      --volume: #10B981;
      --time: #3B82F6;
    }

    body.theme-light {
      --bg: #f8fafc;
      --bg2: #f1f5f9;
      --fg: #0f172a;
      --fg2: #475569;
      --border: #cbd5e1;
    }

    body.theme-pink {
      --ac: #ec4899;
      --ac2: #be185d;
      --bg: #1f1118;
      --bg2: #291b24;
      --fg: #fce7f3;
      --fg2: #f9a8d4;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--ac); border-radius: 3px; }

    button { cursor: pointer; border: none; font-family: inherit; transition: all 0.15s ease; }
    button:active { transform: scale(0.98); }

    input, select, textarea {
      background-color: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--ac);
      background-color: var(--bg2);
    }

    select option { background-color: var(--bg2); }

    .card {
      background-color: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .btn-primary {
      background-color: var(--ac);
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 600;
      transition: background-color 0.2s;
    }

    .btn-primary:hover { background-color: var(--ac2); }

    .btn-secondary {
      background-color: var(--bg2);
      color: var(--fg);
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-weight: 500;
    }

    .btn-secondary:hover { background-color: var(--border); }

    .badge {
      display: inline-block;
      background-color: var(--ac);
      color: white;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }

    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      background-color: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      font-size: 14px;
      animation: slideIn 0.3s ease;
      pointer-events: all;
    }

    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    #header {
      background-color: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    #main {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 120px;
    }

    #nav-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 8px;
      font-size: 12px;
      color: var(--fg2);
      background: none;
      border: none;
      cursor: pointer;
    }

    .nav-btn.active {
      color: var(--ac);
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
    }

    .logo span {
      color: var(--ac);
    }

    .section-header {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--fg2);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .exercise-card {
      background-color: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--ac);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .exercise-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .set-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .set-item {
      background-color: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }

    .set-label {
      font-size: 10px;
      color: var(--fg2);
    }

    .set-value {
      font-weight: 600;
      color: var(--ac);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background-color: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--ac);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--fg2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .error-boundary {
      background-color: var(--bg2);
      border: 2px solid var(--intensity);
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
    }

    .error-title {
      color: var(--intensity);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .error-text {
      font-size: 13px;
      color: var(--fg2);
    }

    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .hidden { display: none !important; }

    /* Offline banner */
    .offline-banner {
      background-color: var(--intensity);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
      text-align: center;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      animation: fadeIn 0.2s ease;
    }

    .modal {
      background: linear-gradient(135deg, var(--bg2) 0%, var(--bg) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      max-width: 90%;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      animation: slideUp 0.3s ease;
    }

    .rpe-modal {
      text-align: center;
    }

    .celebration-modal {
      text-align: center;
    }

    .celebration-emoji {
      font-size: 80px;
      margin-bottom: 12px;
      display: inline-block;
      animation: bounce 0.6s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .celebration-text {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #10B981 0%, #06B6D4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .celebration-subtitle {
      font-size: 14px;
      color: var(--fg2);
      margin-bottom: 20px;
    }

    .stats-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }

    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      min-width: 80px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--ac);
    }

    .stat-label {
      font-size: 11px;
      color: var(--fg2);
      text-transform: uppercase;
    }

    .rpe-display {
      font-size: 42px;
      font-weight: 700;
      color: var(--ac);
      margin-bottom: 16px;
      text-align: center;
    }

      width: 100%;
      height: 8px;
      border-radius: 5px;
      background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      margin: 16px 0;
    }

    .rpe-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ac) 0%, var(--ac2) 100%);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
    }

    .rpe-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ac) 0%, var(--ac2) 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
    }

    .rpe-description {
      font-size: 14px;
      color: var(--fg2);
      margin: 16px 0;
      min-height: 20px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>

<script>
// Initialize __ENV object (will be overwritten by /api/env if available)
if (!window.__ENV) {
  window.__ENV = {
    SUPABASE_URL: '',
    SUPABASE_KEY: ''
  };
}
</script>

<!-- Try to load credentials from Cloudflare Function (non-blocking) -->
<script>
(async () => {
  try {
    const response = await fetch('/api/env');
    if (response.ok) {
      const script = await response.text();
      eval(script);
    }
  } catch(e) {
    console.warn('Env function not available. Check Cloudflare deployment.');
  }
})();
</script>

<script>
// ─── MODULES ─────────────────────────────────────────────────────────────────

const SB_URL = window.__ENV?.SUPABASE_URL || '';
const SB_KEY = window.__ENV?.SUPABASE_KEY || '';

// DB Module - Supabase wrapper
const DB = {
  async get(id) {
    if (!SB_URL || !SB_KEY) throw new Error('Database credentials not loaded');
    const url = `${SB_URL}/rest/v1/gym_data?id=eq.${encodeURIComponent(id)}&select=data`;
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${SB_KEY}` } });
    const data = await res.json();
    return data[0]?.data || null;
  },

  async set(id, data) {
    if (!SB_URL || !SB_KEY) throw new Error('Database credentials not loaded');
    const url = `${SB_URL}/rest/v1/gym_data`;
    await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ id, data, updated_at: new Date().toISOString() })
    });
  },

  async delete(id) {
    if (!SB_URL || !SB_KEY) throw new Error('Database credentials not loaded');
    const url = `${SB_URL}/rest/v1/gym_data?id=eq.${encodeURIComponent(id)}`;
    await fetch(url, { method: 'DELETE', headers: { 'Authorization': `Bearer ${SB_KEY}` } });
  }
};

// CALC Module - Workout math
const CALC = {
  estimatedOneRM(weight, reps) {
    // Epley formula
    return weight * (1 + reps / 30);
  },

  calculateVolume(sets) {
    return sets.reduce((sum, s) => sum + (s.reps * s.weight || 0), 0);
  },

  sessionStats(exercises) {
    let totalVolume = 0;
    let totalIntensity = 0;
    let setCount = 0;

    exercises.forEach(ex => {
      ex.sets?.forEach(s => {
        totalVolume += s.reps * s.weight;
        totalIntensity += s.rpe || 0;
        setCount++;
      });
    });

    return {
      totalVolume,
      avgIntensity: setCount > 0 ? (totalIntensity / setCount).toFixed(1) : 0,
      setCount
    };
  }
};

// VALID Module - Input validation
const VALID = {
  numeric(value, min, max, fieldName) {
    const num = parseFloat(value);
    if (isNaN(num)) throw new Error(`${fieldName} must be a number`);
    if (num < min || num > max) throw new Error(`${fieldName} must be between ${min} and ${max}`);
    return num;
  },

  exerciseSet(set) {
    if (!set.reps || !set.weight) throw new Error('Reps and weight required');
    this.numeric(set.reps, 1, 100, 'Reps');
    this.numeric(set.weight, 0.5, 1000, 'Weight');
    if (set.rpe) this.numeric(set.rpe, 1, 10, 'RPE');
    return true;
  },

  profile(p) {
    if (p.age) this.numeric(p.age, 16, 99, 'Age');
    if (p.height) this.numeric(p.height, 140, 220, 'Height');
    if (p.weight) this.numeric(p.weight, 40, 200, 'Weight');
    return true;
  }
};

// OFFLINE Module
const OFFLINE = {
  isOnline() { return navigator.onLine; },

  queue: [],

  queueOperation(fn) {
    this.queue.push(fn);
  },

  async retryQueue() {
    const failed = [];
    for (const fn of this.queue) {
      try {
        await fn();
      } catch (e) {
        failed.push(fn);
      }
    }
    this.queue = failed;
  }
};

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function showToast(msg, type = 'success') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function goBack() {
  openView('today');
}

function openView(view) {
  currentView = view;
  updateNav();
  render();
}

function updateNav() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === currentView);
  });
  document.getElementById('btn-back').classList.toggle('hidden', currentView === 'today');
}

async function loadState() {
  try {
    const saved = await DB.get('profile');
    if (saved) state = { ...state, ...saved };
    VALID.profile(state.profile);
  } catch (e) {
    console.error('Load error:', e);
    showToast('Error loading data', 'error');
  }
}

async function saveState() {
  try {
    await DB.set('profile', state);
    showToast('Saved ✓');
  } catch (e) {
    console.error('Save error:', e);
    if (!OFFLINE.isOnline()) {
      OFFLINE.queueOperation(() => DB.set('profile', state));
      showToast('Offline: saved locally');
    } else {
      showToast('Error saving', 'error');
    }
  }
}

  const main = document.getElementById('main');
  
  try {
    if (currentView === 'today') main.innerHTML = renderToday();
    else if (currentView === 'workouts') main.innerHTML = renderWorkouts();
    else if (currentView === 'progress') main.innerHTML = renderProgress();
    else if (currentView === 'analytics') main.innerHTML = renderAnalytics();
    else if (currentView === 'equipment') main.innerHTML = renderEquipment();
    else if (currentView === 'notes') main.innerHTML = renderNotes();
    else if (currentView === 'settings') main.innerHTML = renderSettings();
  } catch (e) {
    console.error('Render error:', e);
    main.innerHTML = `
      <div class="error-boundary fade-in">
        <div class="error-title">⚠️ Error</div>
        <div class="error-text">${e.message}</div>
        <button class="btn-primary" style="margin-top: 12px;" onclick="openView('today')">Back to Home</button>
      </div>
    `;
  }
}

function renderProgress() {
  // Calculate PRs from all workouts
  const prs = {};
  Object.entries(state.workouts || {}).forEach(([date, workout]) => {
    (workout.exercises || []).forEach(exercise => {
      if (!exercise.sets || exercise.sets.length === 0) return;
      
      const maxSet = exercise.sets.reduce((max, s) => {
        const weight = s.weight || 0;
        return weight > (max.weight || 0) ? s : max;
      }, {});
      
      const id = exercise.name.toLowerCase().replace(/[^a-z0-9]/g, '_');
      if (!prs[id]) {
        prs[id] = { 
          name: exercise.name, 
          weight: maxSet.weight || 0, 
          reps: maxSet.reps || 0, 
          date,
          history: []
        };
      }
      
      prs[id].history.push({ date, weight: maxSet.weight, reps: maxSet.reps });
      
      if ((maxSet.weight || 0) > prs[id].weight) {
        prs[id].weight = maxSet.weight;
        prs[id].reps = maxSet.reps;
        prs[id].date = date;
      }
    });
  });

  const sortedPRs = Object.values(prs).sort((a, b) => (b.weight || 0) - (a.weight || 0));

  if (sortedPRs.length === 0) {
    return `
      <div class="fade-in">
        <div style="font-size: 20px; font-weight: 700; margin-bottom: 16px;">📈 Progress & PRs</div>
        <div style="text-align: center; color: var(--fg2); padding: 48px 0;">
          Log some workouts to see your PRs!
        </div>
      </div>
    `;
  }

  const prCardsHtml = sortedPRs.slice(0, 10).map((pr, idx) => {
    const dateObj = new Date(pr.date);
    const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    
    // Calculate trend (simple: compare with 30 days ago)
    const thirtyDaysAgo = new Date();
    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
    
    const oldestWeight = pr.history
      .filter(h => new Date(h.date) < thirtyDaysAgo)
      .sort((a, b) => new Date(a.date) - new Date(b.date))[0]?.weight || pr.weight;
    
    const trend = pr.weight - oldestWeight;
    const trendStr = trend > 0 ? `↑ +${trend.toFixed(1)} kg` : trend < 0 ? `↓ ${trend.toFixed(1)} kg` : '→';
    const trendColor = trend > 0 ? '--volume' : trend < 0 ? '--intensity' : '--fg2';
    
    return `
      <div class="card" style="margin-bottom: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
          <div>
            <div style="font-weight: 600;">${pr.name}</div>
            <div style="font-size: 12px; color: var(--fg2);">PR Date: ${dateStr}</div>
          </div>
          <div style="text-align: right;">
            <div style="font-size: 20px; font-weight: 700; color: var(--ac);">${pr.weight.toFixed(1)} kg</div>
            <div style="font-size: 12px; color: var(${trendColor});">${trendStr}</div>
          </div>
        </div>
        <div style="font-size: 13px; color: var(--fg2);">For ${pr.reps} reps (${CALC.estimatedOneRM(pr.weight, pr.reps).toFixed(1)} kg 1RM)</div>
      </div>
    `;
  }).join('');

  return `
    <div class="fade-in">
      <div style="font-size: 20px; font-weight: 700; margin-bottom: 16px;">📈 Progress & PRs</div>
      
      <div style="padding: 12px; background: var(--bg2); border-left: 3px solid var(--volume); border-radius: 6px; margin-bottom: 16px;">
        <div style="font-size: 13px; color: var(--fg2);">Total Workouts: <span style="color: var(--ac); font-weight: 600;">${Object.keys(state.workouts || {}).length}</span></div>
        <div style="font-size: 13px; color: var(--fg2); margin-top: 4px;">Tracked Exercises: <span style="color: var(--ac); font-weight: 600;">${sortedPRs.length}</span></div>
      </div>

      <div class="section-header">Top Personal Records</div>
      ${prCardsHtml}
    </div>
  `;
}

function renderAnalytics() {
  const workoutDates = Object.keys(state.workouts || {}).sort().reverse();
  const thisWeek = workoutDates.filter(date => {
    const d = new Date(date);
    const weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate() - 7);
    return d >= weekAgo;
  });

  // Calculate total volume and intensity
  let totalVolume = 0;
  let totalIntensity = 0;
  let totalSets = 0;
  const muscleGroupVolume = {};

  (state.workouts || {});
  Object.values(state.workouts || {}).forEach(workout => {
    (workout.exercises || []).forEach(exercise => {
      (exercise.sets || []).forEach(set => {
        totalVolume += (set.reps || 0) * (set.weight || 0);
        totalIntensity += set.rpe || 0;
        totalSets++;
        
        // Track by muscle groups
        const exerciseId = exercise.name.toLowerCase().replace(/[^a-z0-9]/g, '_');
        const ex = EXERCISES.find(e => e.id === exerciseId) || 
                   EXERCISES.find(e => e.name === exercise.name);
        
        if (ex && ex.muscleGroups) {
          ex.muscleGroups.forEach(mg => {
            muscleGroupVolume[mg] = (muscleGroupVolume[mg] || 0) + (set.reps * set.weight);
          });
        }
      });
    });
  });

  const avgIntensity = totalSets > 0 ? (totalIntensity / totalSets).toFixed(1) : 0;

  // RPE distribution
  const rpeDistribution = { easy: 0, moderate: 0, hard: 0 };
  Object.values(state.workouts || {}).forEach(workout => {
    (workout.exercises || []).forEach(exercise => {
      (exercise.sets || []).forEach(set => {
        const rpe = set.rpe || 5;
        if (rpe <= 5) rpeDistribution.easy++;
        else if (rpe <= 7) rpeDistribution.moderate++;
        else rpeDistribution.hard++;
      });
    });
  });

  const sortedMuscles = Object.entries(muscleGroupVolume)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 6);

  const totalMuscleVolume = sortedMuscles.reduce((sum, [_, vol]) => sum + vol, 0);

  return `
    <div class="fade-in">
      <div style="font-size: 20px; font-weight: 700; margin-bottom: 16px;">📊 Analytics</div>

      <div class="stats-grid" style="margin-bottom: 16px;">
        <div class="stat-card">
          <div class="stat-value">${totalVolume.toFixed(0)}</div>
          <div class="stat-label">Total Volume</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${avgIntensity}</div>
          <div class="stat-label">Avg RPE</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${thisWeek.length}</div>
          <div class="stat-label">This Week</div>
        </div>
      </div>

      <div class="section-header">Volume by Muscle Group</div>
      ${sortedMuscles.map(([muscle, volume]) => {
        const percent = ((volume / totalMuscleVolume) * 100).toFixed(0);
        const muscleEmoji = {
          'chest': '🏋️', 'back': '🔙', 'shoulders': '🎯',
          'biceps': '💪', 'triceps': '💪', 'quads': '🦵',
          'glutes': '🍑', 'hamstrings': '🦵', 'calves': '📍',
          'abs': '⚡', 'forearms': '🤝', 'traps': '🏔️',
          'lats': '🔙', 'cardio': '🏃', 'core': '⚙️',
          'shoulders': '🎯', 'hip_flexors': '🦵'
        };
        
        return `
          <div style="margin-bottom: 12px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
              <div style="font-weight: 600;">${muscleEmoji[muscle] || '💪'} ${muscle.charAt(0).toUpperCase() + muscle.slice(1)}</div>
              <div style="color: var(--ac); font-weight: 600;">${percent}%</div>
            </div>
            <div style="height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden;">
              <div style="height: 100%; background: var(--ac); width: ${percent}%;"></div>
            </div>
          </div>
        `;
      }).join('')}

      <div class="section-header" style="margin-top: 20px;">Intensity Distribution</div>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
        <div class="card" style="text-align: center;">
          <div style="font-size: 24px; font-weight: 700; color: var(--volume);">${rpeDistribution.easy}</div>
          <div style="font-size: 12px; color: var(--fg2); margin-top: 4px;">Easy (1-5)</div>
        </div>
        <div class="card" style="text-align: center;">
          <div style="font-size: 24px; font-weight: 700; color: var(--weight);">${rpeDistribution.moderate}</div>
          <div style="font-size: 12px; color: var(--fg2); margin-top: 4px;">Moderate (6-7)</div>
        </div>
        <div class="card" style="text-align: center;">
          <div style="font-size: 24px; font-weight: 700; color: var(--intensity);">${rpeDistribution.hard}</div>
          <div style="font-size: 12px; color: var(--fg2); margin-top: 4px;">Hard (8-10)</div>
        </div>
      </div>
    </div>
  `;
}

    return `

        </button>
      </div>
    `;
  }).join('');

  // Get alternative exercises for currently unavailable equipment
  const alternatives = [];
  Object.entries(equipment || {}).forEach(([name, status]) => {

      const equipmentExercises = EXERCISES.filter(e => e.equipment === name);
      equipmentExercises.forEach(ex => {

          a.muscleGroups?.some(m => ex.muscleGroups?.includes(m)) &&

          alternatives.push({

function showAddExerciseForm() {
  const exerciseName = prompt('Exercise name:');
  if (!exerciseName) return;

  const reps = prompt('Reps per set:');
  const weight = prompt('Weight (kg):');
  
  if (!reps || !weight) {
    showToast('Cancelled', 'info');
    return;
  }

  try {
    VALID.numeric(reps, 1, 100, 'Reps');
    VALID.numeric(weight, 0.5, 1000, 'Weight');

    const today = getToday();
    if (!state.workouts[today]) state.workouts[today] = { exercises: [], notes: '' };

    const sets = parseInt(prompt('Number of sets:') || '3');
    
    state.workouts[today].exercises.push({
      name: exerciseName,
      sets: Array(sets).fill(null).map(() => ({ reps: parseInt(reps), weight: parseFloat(weight), rpe: null }))
    });

    saveState();
    render();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

function toggleExerciseComplete(idx) {
  const today = getToday();
  if (!state.workouts[today] || !state.workouts[today].exercises[idx]) return;
  state.workouts[today].exercises[idx].completed = !state.workouts[today].exercises[idx].completed;
  
  // If marking as complete, show RPE input modal
  if (state.workouts[today].exercises[idx].completed) {
    const exName = state.workouts[today].exercises[idx].name;
    showRPEModal(idx, exName);  // RPE modal will handle celebration trigger
  } else {
    saveState();
    render();
  }
}

function showRPEModal(exerciseIdx, exerciseName) {
  // RPE descriptions
  const descriptions = {
    0: 'No effort - rest',
    1: 'Very easy - warm-up',
    2: 'Easy - felt good',
    3: 'Easy - felt good',
    4: 'Easy - felt good',
    5: 'Moderate - some effort',
    6: 'Moderate - some effort',
    7: 'Hard - pushing it',
    8: 'Very hard - almost max',
    9: 'Almost maxed out',
    10: 'Maximum effort - couldn\'t do another'
  };
  
  // Helper to get description for RPE value
  const getDesc = (rpe) => descriptions[rpe] || 'Rate your effort';
  
  // Calculate historical average RPE for this exercise
  let defaultRPE = 0;
  let historicalRPEs = [];
  
  // Search all past workouts for this exercise name
  Object.entries(state.workouts || {}).forEach(([date, workout]) => {
    if (date === getToday()) return; // Skip current workout
    (workout.exercises || []).forEach(ex => {
      if (ex.name === exerciseName && ex.rpe) {
        historicalRPEs.push(ex.rpe);
      }
    });
  });
  
  // Use average if history exists, otherwise 0
  if (historicalRPEs.length > 0) {
    defaultRPE = Math.round(historicalRPEs.reduce((a, b) => a + b, 0) / historicalRPEs.length);
  }
  
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal rpe-modal">
      <div style="font-weight: 700; font-size: 16px; margin-bottom: 8px;">How hard was it?</div>
      <div style="font-size: 13px; color: var(--fg2); margin-bottom: 20px;">Rate your effort (RPE)${historicalRPEs.length > 0 ? ` - Avg: ${defaultRPE}` : ''}</div>
      
      <div class="rpe-display" id="rpe-display">${defaultRPE}</div>
      <input type="range" id="rpe-slider" class="rpe-slider" min="0" max="10" value="${defaultRPE}" oninput="document.getElementById('rpe-display').textContent = this.value;">
      
      <div class="rpe-description" id="rpe-description">${getDesc(defaultRPE)}</div>
      
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="this.parentElement.parentElement.parentElement.remove(); render();" style="background: var(--bg2); color: var(--fg);">Skip</button>
        <button class="btn-primary" onclick="setRPEAndClose(${exerciseIdx});">✓ Done</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  
  // Update description as slider changes
  const slider = document.getElementById('rpe-slider');
  slider.addEventListener('input', (e) => {
    document.getElementById('rpe-description').textContent = getDesc(e.target.value);
  });
}

function getDescriptionForRPE(rpe) {
  const descriptions = {
    0: 'No effort - rest',
    1: 'Very easy - warm-up',
    2: 'Easy - felt good',
    3: 'Easy - felt good',
    4: 'Easy - felt good',
    5: 'Moderate - some effort',
    6: 'Moderate - some effort',
    7: 'Hard - pushing it',
    8: 'Very hard - almost max',
    9: 'Almost maxed out',
    10: 'Maximum effort - couldn\'t do another'
  };
  return descriptions[rpe] || 'Rate your effort';
}

function setRPEAndClose(exerciseIdx) {
  const rpe = parseInt(document.getElementById('rpe-slider').value);
  const today = getToday();
  
  if (state.workouts[today].exercises[exerciseIdx]) {
    state.workouts[today].exercises[exerciseIdx].rpe = rpe;
  }
  
  document.querySelector('.modal-overlay').remove();
  saveState();
  
  // Check if ALL exercises are now complete (with RPE saved)
  const totalEx = state.workouts[today].exercises.length;
  const completedEx = state.workouts[today].exercises.filter(ex => ex.completed).length;
  
  if (completedEx === totalEx) {
    // Show celebration AFTER final RPE is saved
    showCelebrationModal();
  }
  
  render();
}

  const totalVolume = CALC.calculateVolume(workout.exercises?.flatMap(e => e.sets || []) || []);
  const duration = workout.duration || '-';
  const exCount = workout.exercises?.length || 0;
  
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal celebration-modal">
      <div class="celebration-emoji">🎉</div>
      <div class="celebration-text">Workout Crushed!</div>
      <div class="celebration-subtitle">Amazing work today! You completed all your exercises.</div>
      
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-value">${exCount}</div>
          <div class="stat-label">Exercises</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${totalVolume.toFixed(0)}</div>
          <div class="stat-label">kg Volume</div>

      <div style="background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(6, 182, 212, 0.05) 100%); border: 1px solid rgba(16, 185, 129, 0.2); padding: 16px; border-radius: 10px; margin: 20px 0;">
        <div style="font-size: 13px; color: var(--fg2); margin-bottom: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">💪 Keep it up!</div>
        <div style="font-size: 14px; color: var(--fg); line-height: 1.6;">You're building momentum. Rest well and come back stronger!</div>
      </div>
      
      <button class="btn-primary" onclick="this.parentElement.parentElement.remove();" style="width: 100%; margin-top: 16px; padding: 14px; font-weight: 700; background: linear-gradient(135deg, #10B981 0%, #06B6D4 100%);">✓ Awesome!</button>

function deleteExercise(idx) {
  const today = getToday();
  state.workouts[today].exercises.splice(idx, 1);
  saveState();
  render();
}

function saveWorkoutNotes() {
  const today = getToday();
  if (!state.workouts[today]) state.workouts[today] = { exercises: [], notes: '' };
  state.workouts[today].notes = document.getElementById('workout-notes').value;
  saveState();
}

function saveProfile() {
  try {
    state.profile.name = document.getElementById('profile-name').value;
    state.profile.age = parseInt(document.getElementById('profile-age').value);
    state.profile.weight = parseFloat(document.getElementById('profile-weight').value);
    
    VALID.profile(state.profile);
    saveState();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

function changeTheme(theme) {
  document.body.className = `theme-${theme}`;
  state.preferences.theme = theme;
  saveState();
}

function changeLanguage(lang) {
  state.preferences.language = lang;
  saveState();
  render();
}

function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gym-tracker-data.json';
  a.click();
}

function deleteAllData() {
  if (confirm('Delete ALL data? This cannot be undone.')) {
    // Clear all existing properties
    Object.keys(state).forEach(key => delete state[key]);
    
    // Reset to defaults
    Object.assign(state, {
      profile: { name: 'User', age: 25, height: 180, weight: 80, goal: 'strength', experience: 'intermediate' },
      preferences: { language: 'en', theme: 'dark', units: 'kg' },
      workouts: {},
      prs: {},
      equipment: {}
    });
    
    saveState();
    render();
  }
}

// ─── WORKOUTS ACTIONS ────────────────────────────────────────────────────────

function viewWorkoutDetails(date) {
  const workout = state.workouts[date];
  if (!workout) return;
  
  const dateObj = new Date(date);
  const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  
  const stats = CALC.sessionStats(workout.exercises || []);
  
  let html = `
    <div class="fade-in">
      <button class="btn-secondary" onclick="openView('workouts')" style="margin-bottom: 16px;">← Back to Workouts</button>
      <div style="font-size: 18px; font-weight: 700; margin-bottom: 12px;">${dateStr}</div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${stats.setCount}</div>
          <div class="stat-label">Sets</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${stats.totalVolume.toFixed(0)}</div>
          <div class="stat-label">Volume (kg)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${stats.avgIntensity}</div>
          <div class="stat-label">Avg RPE</div>
        </div>
      </div>
      
      <div style="margin-bottom: 16px; padding: 12px; background: var(--bg2); border-radius: 8px; border-left: 3px solid var(--ac);">
        <div style="font-size: 13px; color: var(--fg2);">${workout.notes || 'No notes'}</div>
      </div>
      
      <div class="section-header">Exercises</div>
      ${(workout.exercises || []).map((ex, idx) => `
        <div class="exercise-card">
          <div class="exercise-name">${ex.name}</div>
          <div class="set-row">
            ${(ex.sets || []).map(s => `
              <div class="set-item">
                <div class="set-label">Set</div>
                <div style="font-size: 11px; margin-bottom: 2px;">${s.reps}×${s.weight}kg</div>
                ${s.rpe ? `<div class="set-label">RPE ${s.rpe}</div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  
  document.getElementById('main').innerHTML = html;
}

function startFromTemplate(idx) {
  const template = (state.workoutTemplates || [])[idx];
  if (!template) return;
  
  const today = getToday();
  state.workouts[today] = { 
    exercises: JSON.parse(JSON.stringify(template.exercises || [])), 
    notes: '' 
  };
  saveState();
  openView('today');
  showToast(`Started workout: ${template.name}`);
}

function deleteTemplate(idx) {
  if (confirm('Delete this template?')) {
    state.workoutTemplates = state.workoutTemplates || [];
    state.workoutTemplates.splice(idx, 1);
    saveState();
    render();
  }
}

function saveCurrentAsTemplate() {
  const today = getToday();
  const workout = state.workouts[today];
  
  if (!workout || !workout.exercises || workout.exercises.length === 0) {
    showToast('No exercises to save', 'error');
    return;
  }
  
  const name = prompt('Template name:');
  if (!name) return;
  
  state.workoutTemplates = state.workoutTemplates || [];
  state.workoutTemplates.push({
    name,
    exercises: JSON.parse(JSON.stringify(workout.exercises)),
    createdAt: new Date().toISOString()
  });
  
  saveState();
  render();
  showToast('Template saved ✓');
}

// ─── EQUIPMENT ACTIONS ───────────────────────────────────────────────────────

function toggleEquipment(name) {
  state.equipment = state.equipment || {};
  state.equipment[name] = state.equipment[name] || { available: true };
  state.equipment[name].available = !state.equipment[name].available;
  saveState();
  render();
}

function addEquipment() {
  const name = prompt('Equipment name:');
  if (!name) return;
  
  state.equipment = state.equipment || {};
  state.equipment[name.toLowerCase().replace(/[^a-z0-9]/g, '_')] = { available: true };
  saveState();
  render();
}

// ─── NOTES ACTIONS ───────────────────────────────────────────────────────────

function addFormTip() {
  const exercise = prompt('Exercise name:');
  if (!exercise) return;
  
  const text = prompt('Form tip (e.g., "Keep chest up, bar path is vertical"):');
  if (!text) return;
  
  state.progressNotes = state.progressNotes || [];
  state.progressNotes.push({
    type: 'form',
    exercise,
    text,
    date: new Date().toISOString()
  });
  
  saveState();
  render();
  showToast('Form tip added ✓');
}

function addInjuryNote() {
  const exercise = prompt('Exercise that causes pain:');
  if (!exercise) return;
  
  const text = prompt('Description (e.g., "Shoulder impingement on overhead press"):');
  if (!text) return;
  
  const severity = prompt('Severity (1-10):');
  if (!severity) return;
  
  try {
    const sev = VALID.numeric(severity, 1, 10, 'Severity');
    
    state.progressNotes = state.progressNotes || [];
    state.progressNotes.push({
      type: 'injury',
      exercise,
      text,
      severity: sev,
      date: new Date().toISOString(),
      avoidExercises: []
    });
    
    saveState();
    render();
    showToast('Injury logged ✓');
  } catch (e) {
    showToast(e.message, 'error');
  }
}

function deleteNote(idx) {
  if (confirm('Delete this note?')) {
    state.progressNotes = state.progressNotes || [];
    state.progressNotes.splice(idx, 1);
    saveState();
    render();
  }
}

// ─── COMMUNITY ACTIONS ───────────────────────────────────────────────────────

function cloneWorkout(workoutId) {
  const workouts = [
    { id: 1, name: 'Push/Pull/Legs Split', exercises: [
      { name: 'Barbell Bench Press', sets: [{ reps: 5, weight: 100 }, { reps: 5, weight: 100 }] },
      { name: 'Incline Barbell Press', sets: [{ reps: 6, weight: 85 }] }
    ]},
    { id: 2, name: 'Upper/Lower Split', exercises: [
      { name: 'Barbell Bench Press', sets: [{ reps: 8, weight: 95 }] },
      { name: 'Lat Pulldown', sets: [{ reps: 8, weight: 80 }] }
    ]},
    { id: 3, name: 'Full Body 3x/week', exercises: [
      { name: 'Back Squat', sets: [{ reps: 5, weight: 120 }] },
      { name: 'Barbell Bench Press', sets: [{ reps: 5, weight: 100 }] },
      { name: 'Barbell Row', sets: [{ reps: 5, weight: 105 }] }
    ]},
    { id: 4, name: 'Leg Day Destroyer', exercises: [
      { name: 'Back Squat', sets: [{ reps: 6, weight: 115 }] },
      { name: 'Leg Press', sets: [{ reps: 8, weight: 250 }] }
    ]},
    { id: 5, name: 'Hypertrophy Focus', exercises: [
      { name: 'Dumbbell Bench Press', sets: [{ reps: 8, weight: 45 }] },
      { name: 'Lat Pulldown', sets: [{ reps: 8, weight: 75 }] }
    ]}
  ];
  
  const workout = workouts.find(w => w.id === workoutId);
  if (!workout) return;
  
  const today = getToday();
  state.workouts[today] = {
    exercises: JSON.parse(JSON.stringify(workout.exercises)),
    notes: `Cloned from: ${workout.name}`
  };
  
  saveState();
  openView('today');
  showToast(`Started: ${workout.name}`);
}

// ─── OFFLINE HANDLING ─────────────────────────────────────────────────────────

window.addEventListener('online', () => {
  showToast('Back online! Syncing...');
  OFFLINE.retryQueue();
});

window.addEventListener('offline', () => {
  showToast('No internet connection');
});

// ─── MEMORY CLEANUP ──────────────────────────────────────────────────────────

window.addEventListener('beforeunload', () => {
  saveState();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────

(async () => {
  try {
    await loadState();
    updateNav();
    render();
  } catch (e) {
    console.error('Init error:', e);
    showToast('Failed to load. Check credentials.', 'error');
  }
})();
</script>
